name: CI/CD

'on':
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VITE_API_URL: ${{ vars.VITE_API_URL }}
  VITE_DOGS_API_URL: ${{ vars.VITE_DOGS_API_URL }}
  VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
  VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
  VITE_DEMO_MODE: ${{ vars.VITE_DEMO_MODE }}

jobs:
  ci:
    name: Typecheck, test and build
    runs-on: ubuntu-latest

    steps:
      - name: Validate production PR source
        if: github.event_name == 'pull_request' && github.base_ref == 'main' && github.head_ref != 'develop'
        run: |
          echo "Pull requests targeting main must come from develop."
          echo "Current source branch: ${{ github.head_ref }}"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    concurrency:
      group: github-pages
      cancel-in-progress: false

    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          path: current

      - name: Resolve deploy branches
        id: branches
        working-directory: current
        shell: bash
        run: |
          current_branch="${GITHUB_REF_NAME}"
          dev_branch="develop"
          prod_branch=""

          if git ls-remote --exit-code --heads origin main >/dev/null 2>&1; then
            prod_branch="main"
          elif git ls-remote --exit-code --heads origin master >/dev/null 2>&1; then
            prod_branch="master"
          fi

          if [ "$current_branch" = "$prod_branch" ]; then
            paired_branch="$dev_branch"
            current_base="/react-dogs/"
            current_output="../site"
            paired_base="/react-dogs/dev/"
            paired_output="../site/dev"
          else
            paired_branch="$prod_branch"
            current_base="/react-dogs/dev/"
            current_output="../site/dev"
            paired_base="/react-dogs/"
            paired_output="../site"
          fi

          echo "paired_branch=$paired_branch" >> "$GITHUB_OUTPUT"
          echo "current_base=$current_base" >> "$GITHUB_OUTPUT"
          echo "current_output=$current_output" >> "$GITHUB_OUTPUT"
          echo "paired_base=$paired_base" >> "$GITHUB_OUTPUT"
          echo "paired_output=$paired_output" >> "$GITHUB_OUTPUT"

      - name: Checkout paired branch
        if: steps.branches.outputs.paired_branch != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branches.outputs.paired_branch }}
          path: paired

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: current/yarn.lock

      - name: Build current branch
        working-directory: current
        env:
          DEV_VITE_API_URL: ${{ vars.VITE_API_URL_DEV || vars.VITE_API_URL }}
          DEV_VITE_DOGS_API_URL: ${{ vars.VITE_DOGS_API_URL_DEV || vars.VITE_DOGS_API_URL }}
          DEV_VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL_DEV || vars.VITE_SUPABASE_URL }}
          DEV_VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY_DEV || vars.VITE_SUPABASE_ANON_KEY }}
          DEV_VITE_DEMO_MODE: ${{ vars.VITE_DEMO_MODE_DEV || vars.VITE_DEMO_MODE }}
          PROD_VITE_API_URL: ${{ vars.VITE_API_URL_PROD || vars.VITE_API_URL }}
          PROD_VITE_DOGS_API_URL: ${{ vars.VITE_DOGS_API_URL_PROD || vars.VITE_DOGS_API_URL }}
          PROD_VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL_PROD || vars.VITE_SUPABASE_URL }}
          PROD_VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY_PROD || vars.VITE_SUPABASE_ANON_KEY }}
          PROD_VITE_DEMO_MODE: ${{ vars.VITE_DEMO_MODE_PROD || vars.VITE_DEMO_MODE }}
        run: |
          if [ "${{ steps.branches.outputs.current_base }}" = "/react-dogs/" ]; then
            export VITE_API_URL="$PROD_VITE_API_URL"
            export VITE_DOGS_API_URL="$PROD_VITE_DOGS_API_URL"
            export VITE_SUPABASE_URL="$PROD_VITE_SUPABASE_URL"
            export VITE_SUPABASE_ANON_KEY="$PROD_VITE_SUPABASE_ANON_KEY"
            export VITE_DEMO_MODE="$PROD_VITE_DEMO_MODE"
          else
            export VITE_API_URL="$DEV_VITE_API_URL"
            export VITE_DOGS_API_URL="$DEV_VITE_DOGS_API_URL"
            export VITE_SUPABASE_URL="$DEV_VITE_SUPABASE_URL"
            export VITE_SUPABASE_ANON_KEY="$DEV_VITE_SUPABASE_ANON_KEY"
            export VITE_DEMO_MODE="$DEV_VITE_DEMO_MODE"
          fi
          yarn install --frozen-lockfile
          yarn build --base="${{ steps.branches.outputs.current_base }}"
          mkdir -p "${{ steps.branches.outputs.current_output }}"
          cp -R dist/. "${{ steps.branches.outputs.current_output }}/"

      - name: Build paired branch
        if: steps.branches.outputs.paired_branch != ''
        working-directory: paired
        env:
          DEV_VITE_API_URL: ${{ vars.VITE_API_URL_DEV || vars.VITE_API_URL }}
          DEV_VITE_DOGS_API_URL: ${{ vars.VITE_DOGS_API_URL_DEV || vars.VITE_DOGS_API_URL }}
          DEV_VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL_DEV || vars.VITE_SUPABASE_URL }}
          DEV_VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY_DEV || vars.VITE_SUPABASE_ANON_KEY }}
          DEV_VITE_DEMO_MODE: ${{ vars.VITE_DEMO_MODE_DEV || vars.VITE_DEMO_MODE }}
          PROD_VITE_API_URL: ${{ vars.VITE_API_URL_PROD || vars.VITE_API_URL }}
          PROD_VITE_DOGS_API_URL: ${{ vars.VITE_DOGS_API_URL_PROD || vars.VITE_DOGS_API_URL }}
          PROD_VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL_PROD || vars.VITE_SUPABASE_URL }}
          PROD_VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY_PROD || vars.VITE_SUPABASE_ANON_KEY }}
          PROD_VITE_DEMO_MODE: ${{ vars.VITE_DEMO_MODE_PROD || vars.VITE_DEMO_MODE }}
        run: |
          if [ "${{ steps.branches.outputs.paired_base }}" = "/react-dogs/" ]; then
            export VITE_API_URL="$PROD_VITE_API_URL"
            export VITE_DOGS_API_URL="$PROD_VITE_DOGS_API_URL"
            export VITE_SUPABASE_URL="$PROD_VITE_SUPABASE_URL"
            export VITE_SUPABASE_ANON_KEY="$PROD_VITE_SUPABASE_ANON_KEY"
            export VITE_DEMO_MODE="$PROD_VITE_DEMO_MODE"
          else
            export VITE_API_URL="$DEV_VITE_API_URL"
            export VITE_DOGS_API_URL="$DEV_VITE_DOGS_API_URL"
            export VITE_SUPABASE_URL="$DEV_VITE_SUPABASE_URL"
            export VITE_SUPABASE_ANON_KEY="$DEV_VITE_SUPABASE_ANON_KEY"
            export VITE_DEMO_MODE="$DEV_VITE_DEMO_MODE"
          fi
          yarn install --frozen-lockfile
          yarn build --base="${{ steps.branches.outputs.paired_base }}"
          mkdir -p "${{ steps.branches.outputs.paired_output }}"
          cp -R dist/. "${{ steps.branches.outputs.paired_output }}/"

      - name: Add SPA fallbacks
        run: |
          printf '%s\n' \
            '<!doctype html>' \
            '<html lang="pt-BR">' \
            '  <head>' \
            '    <meta charset="UTF-8" />' \
            '    <title>Dogs</title>' \
            '    <script>' \
            '      const path = window.location.pathname;' \
            "      const base = path.startsWith('/react-dogs/dev/') ? '/react-dogs/dev/' : '/react-dogs/';" \
            '      const route = path + window.location.search;' \
            "      window.location.replace(base + '?__route=' + encodeURIComponent(route) + window.location.hash);" \
            '    </script>' \
            '  </head>' \
            '  <body></body>' \
            '</html>' \
            > site/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
